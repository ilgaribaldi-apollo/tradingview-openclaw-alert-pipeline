slug: "macd-strategy"
summary: "MACD crossover state strategy in the same persistent-state style used by HPotter's older public scripts. Long state when MACD line is above signal line, short state when below."
signal_model: "state_based"
inputs:
  fast_length: 12
  slow_length: 26
  signal_length: 9
features:
  - ema
  - macd_line
  - signal_line
  - directional_state
unsupported:
  - bar coloring
entry_logic: "Enter long when MACD line crosses above signal line and state flips to 1."
exit_logic: "Exit long when MACD line crosses below signal line and state flips to -1."
caution_flags:
  - source_capture_was_flaky_in_tv_editor
translation_notes: "TradingView search and script identity were confirmed with the TradingView skill, but the Pine editor stayed pinned to the previously opened script during this session. Translation uses the canonical MACD crossover state logic consistent with the confirmed script identity."
