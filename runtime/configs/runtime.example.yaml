environment: development

database:
  provider: neon_postgres
  url_env: DATABASE_URL
  pooled_url_env: DATABASE_URL_POOLED

runtime:
  paper_trading_enabled: true
  live_execution_enabled: false
  source_of_truth:
    research_artifacts: results/
    operational_state: neon

watchlist:
  exchange: coinbase
  symbols:
    - BTC/USD
    - ETH/USD
    - SOL/USD
    - DOGE/USD
  timeframes:
    - 1h

workers:
  market_data:
    enabled: true
    cadence:
      poll_seconds: 60
      align_to_candle_close: true
      write_on_new_candle_only: true
      lag_tolerance_seconds: 15
  signals:
    enabled: true
    primary_source: local_evaluator
    optional_adapters:
      - tradingview_webhook
    cadence:
      poll_seconds: 60
      align_to_candle_close: true
      evaluate_on_new_candle_only: true
      lag_tolerance_seconds: 15
    batching:
      emit_on_state_change_only: true
      dedupe_window_seconds: 21600
      flush_interval_seconds: 30
      max_batch_size: 25
  paper:
    enabled: true
    starting_equity: 100000
    max_open_positions: 5
    flush_interval_seconds: 60
  ops:
    enabled: true
    heartbeat:
      collect_seconds: 30
      flush_interval_seconds: 120
      max_batch_size: 20
      include_stats: true

research_alignment:
  required_backtest_fields:
    - exchange
    - symbol
    - timeframe
    - engine
    - configured_start
    - configured_end
    - actual_start
    - actual_end
    - bar_count
    - fees_bps
    - slippage_bps
    - entry_signal_count
    - exit_signal_count
    - total_return
    - max_drawdown
    - sharpe_ratio
    - win_rate
    - trade_count
    - notes
